name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Build node package
        run: npm run build -w packages/node

      - name: Build VS Code extension
        run: npm run compile -w packages/node

      - name: Test node package
        run: npm test -w packages/node

      - name: Lint browser package
        run: npm run lint -w packages/browser

      - name: Test browser package
        run: npm test -w packages/browser

      - name: Verify chat-a11y.js synced to node media
        run: git diff --no-index --exit-code packages/browser/chat-a11y.js packages/node/media/chat-a11y.js

  package-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Build all
        run: npm run build:all

      - name: CLI package size
        working-directory: packages/node
        run: npm pack --dry-run 2>&1

      - name: Extension bundle size
        run: |
          echo "Extension bundle:"
          ls -lh packages/node/dist/extension.js 2>/dev/null || echo "Not built"

      - name: Package VS Code extension (.vsix)
        working-directory: packages/node
        run: npx @vscode/vsce package --no-dependencies --out claude-accessible.vsix 2>&1

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-accessible-vsix
          path: packages/node/claude-accessible.vsix
          if-no-files-found: warn
