name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Build core
        run: npm run build -w packages/core

      - name: Build CLI
        run: npm run build -w packages/cli

      - name: Build extension
        run: npm run compile -w packages/vscode-extension

      - name: Test core
        run: npm test -w packages/core

      - name: Test CLI
        run: npm test -w packages/cli

      - name: Test extension
        run: npm test -w packages/vscode-extension

      - name: Test chrome extension
        run: npm test -w packages/chrome-extension

      - name: Verify chat-a11y.js copies in sync
        run: diff packages/chrome-extension/chat-a11y.js packages/vscode-extension/media/chat-a11y.js

  package-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Build all
        run: npm run build:all

      - name: CLI package size
        working-directory: packages/cli
        run: npm pack --dry-run 2>&1

      - name: Extension bundle size
        run: |
          echo "Extension bundle:"
          ls -lh packages/vscode-extension/dist/extension.js 2>/dev/null || echo "Not built"
