name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - run: npm install
      - run: npm run build
      - run: npm test

      # Byte-level verification (Linux/macOS only — needs xxd)
      - name: Verify clean output
        if: runner.os != 'Windows'
        run: bash tests/verify.sh

      # Benchmarks (informational, don't fail CI)
      - name: Run benchmarks
        run: npx tsx tests/benchmark.ts
        continue-on-error: true

  # Package size check
  package-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install && npm run build
      - name: Check package size
        run: |
          npm pack --dry-run 2>&1
          echo "Package contents:"
          npm pack --dry-run 2>&1 | tail -20
